name: Test

# リリースは AWS へ terraform で手動実行するため、CI はデプロイせず
# 型チェックとエンドポイント結合テストのみを回す。
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (endpoint integration)
        run: npm test
